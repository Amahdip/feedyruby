{{- if and .Values.hub.enabled .Values.hub.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "feedyruby.hubname" . }}
  labels:
    helm.sh/chart: {{ include "feedyruby.chart" . }}
    app.kubernetes.io/name: {{ include "feedyruby.hubname" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: hub
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOfOverride | default (include "feedyruby.name" .) }}
    {{- with .Values.hub.autoscaling.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.hub.autoscaling.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "feedyruby.hubname" . }}
  minReplicas: {{ .Values.hub.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.hub.autoscaling.maxReplicas }}
  metrics:
    {{- toYaml .Values.hub.autoscaling.metrics | nindent 4 }}
  {{- with .Values.hub.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
