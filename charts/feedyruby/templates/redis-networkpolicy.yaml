{{- if and .Values.redis.enabled .Values.redis.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "feedyruby.redisMasterName" . }}
  labels:
    helm.sh/chart: {{ include "feedyruby.chart" . }}
    app.kubernetes.io/name: {{ include "feedyruby.redisName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: redis
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Values.partOfOverride | default (include "feedyruby.name" .) }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "feedyruby.redisName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: redis
          protocol: TCP
{{- end }}
