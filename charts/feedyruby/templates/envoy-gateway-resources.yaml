{{- if .Values.envoy.enabled }}
{{- if and (not .Values.envoy.feedyruby.gatewayClass.create) (not .Values.envoy.feedyruby.gatewayClass.name) -}}
{{- fail "envoy.feedyruby.gatewayClass.name is required when envoy.feedyruby.gatewayClass.create=false" -}}
{{- end -}}
{{- $namespace := include "feedyruby.namespace" . -}}
{{- $gatewayName := include "feedyruby.envoy.gatewayName" . -}}
{{- $gatewayClassName := include "feedyruby.envoy.gatewayClassName" . -}}
{{- $proxyName := include "feedyruby.envoy.proxyName" . -}}
{{- $proxyServiceName := include "feedyruby.envoy.proxyServiceName" . -}}
{{- $appSecretName := include "feedyruby.appSecretName" . -}}
{{- $appServiceName := include "feedyruby.name" . -}}
{{- $hubServiceName := include "feedyruby.hubname" . -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ $proxyName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: {{ .Values.envoy.feedyruby.proxy.replicas }}
      envoyService:
        name: {{ $proxyServiceName }}
        type: {{ .Values.envoy.feedyruby.proxy.service.type }}
        labels:
          app.kubernetes.io/name: {{ $proxyServiceName }}
          app.kubernetes.io/managed-by: {{ .Release.Service }}
        {{- if .Values.envoy.feedyruby.proxy.service.annotations }}
        annotations:
          {{- include "feedyruby.tplvalues.render" (dict "value" .Values.envoy.feedyruby.proxy.service.annotations "context" $ ) | nindent 10 }}
        {{- end }}
  logging:
    level:
      default: {{ .Values.envoy.feedyruby.proxy.logging.defaultLevel | quote }}
  telemetry:
    metrics:
      prometheus:
        disable: {{ not .Values.envoy.feedyruby.proxy.telemetry.prometheus.enabled }}
    {{- if .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.enabled }}
      sinks:
        - type: OpenTelemetry
          openTelemetry:
            {{- if .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.host }}
            host: {{ .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.host | quote }}
            port: {{ .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.port }}
            {{- else }}
            backendRefs:
              {{- toYaml .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.backendRefs | nindent 14 }}
            {{- end }}
            resourceAttributes:
              service.name: {{ default $proxyServiceName .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.serviceName | quote }}
              service.namespace: {{ default $namespace .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.serviceNamespace | quote }}
              deployment.environment: {{ default "self-hosted" .Values.envoy.feedyruby.proxy.telemetry.openTelemetry.deploymentEnvironment | quote }}
    {{- end }}
  preserveRouteOrder: true
{{- if .Values.envoy.feedyruby.gatewayClass.create }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ $gatewayClassName }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.envoy.config.envoyGateway.gateway.controllerName | quote }}
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: {{ $proxyName }}
    namespace: {{ $namespace }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ $gatewayClassName }}
  listeners:
    - name: {{ .Values.envoy.feedyruby.gateway.listenerName }}
      protocol: HTTP
      port: {{ .Values.envoy.feedyruby.gateway.port }}
      allowedRoutes:
        namespaces:
          from: Same
{{- if .Values.envoy.feedyruby.clientTrafficPolicy.enabled }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: {{ printf "%s-client-ip" $gatewayName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gatewayName }}
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: {{ .Values.envoy.feedyruby.clientTrafficPolicy.numTrustedHops }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-health" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- if .Values.envoy.feedyruby.routes.authCallback }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-auth-callback" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth/callback
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.v1Client }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-v1-client" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/client
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.v2Client }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-v2-client" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2/client
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.v1Management }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-v1-management" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/management
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.v1Webhooks }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-v1-webhooks" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/webhooks
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.storage }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-storage" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /storage
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- if .Values.envoy.feedyruby.routes.feedbackRecords }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-feedback-records-token" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/v3/feedbackRecords/token
      backendRefs:
        - kind: Service
          name: {{ $appServiceName }}
          port: 3000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: {{ printf "%s-feedback-records-credential-injection" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  credentialInjection:
    overwrite: true
    credential:
      valueRef:
        name: {{ $appSecretName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-feedback-records-v3" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v3/feedbackRecords
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v1/feedback-records
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: {{ printf "%s-feedback-records-credential-injection" $proxyServiceName }}
      backendRefs:
        - kind: Service
          name: {{ $hubServiceName }}
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-feedback-records-sdk" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      sectionName: {{ .Values.envoy.feedyruby.gateway.listenerName }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/feedback-records
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: {{ printf "%s-feedback-records-credential-injection" $proxyServiceName }}
      backendRefs:
        - kind: Service
          name: {{ $hubServiceName }}
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ printf "%s-feedback-records-auth" $proxyServiceName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-feedback-records-v3" $proxyServiceName }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-feedback-records-sdk" $proxyServiceName }}
  extAuth:
    headersToExtAuth:
      - authorization
      - x-api-key
      - cookie
      - content-type
      - x-request-id
      - x-forwarded-for
    bodyToExtAuth:
      maxRequestBytes: 1048576
    statusOnError: 503
    failOpen: false
    http:
      path: /api/envoy-auth
      backendRefs:
        - name: {{ $appServiceName }}
          port: 3000
{{- end }}
{{- end }}
