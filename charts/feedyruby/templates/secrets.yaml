{{- if and (.Values.secret) (.Values.secret.enabled) }}

{{- $postgresAdminPassword := include "feedyruby.postgresAdminPassword" . }}
{{- $postgresUserPassword := include "feedyruby.postgresUserPassword" . }}
{{- $redisPassword := "" }}
{{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
{{- $redisPassword = include "feedyruby.redisPassword" . }}
{{- end }}
{{- $webappUrl := required "feedyruby.webappUrl is required. Set it to your FeedyRuby instance URL (e.g., https://feedyruby.example.com)" .Values.feedyruby.webappUrl }}
{{- $hubApiKey := include "feedyruby.hubApiKey" . }}
{{- $cubejsApiSecret := include "feedyruby.cubejsApiSecret" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "feedyruby.appSecretName" . }}
  labels:
    {{- include "feedyruby.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  # FeedyRuby application URLs
  WEBAPP_URL: {{ $webappUrl | b64enc }}
  NEXTAUTH_URL: {{ $webappUrl | b64enc }}
  {{- if .Values.feedyruby.publicUrl }}
  PUBLIC_URL: {{ .Values.feedyruby.publicUrl | b64enc }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379" $redisPassword (include "feedyruby.redisMasterName" .) | b64enc }}
  {{- else if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://%s:6379" (include "feedyruby.redisMasterName" .) | b64enc }}
  {{- else }}
  REDIS_URL: {{ .Values.redis.externalRedisUrl | b64enc }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://feedyruby:%s@feedyruby-postgresql/feedyruby" $postgresUserPassword | b64enc }}
  {{- else }}
  DATABASE_URL: {{ .Values.postgresql.externalDatabaseUrl | b64enc }}
  {{- end }}
  HUB_API_KEY: {{ $hubApiKey | b64enc }}
  credential: {{ printf "Bearer %s" $hubApiKey | b64enc }}
  CUBEJS_API_SECRET: {{ $cubejsApiSecret | b64enc }}
  CRON_SECRET: {{ include "feedyruby.cronSecret" . | b64enc }}
  ENCRYPTION_KEY: {{ include "feedyruby.encryptionKey" . | b64enc }}
  NEXTAUTH_SECRET: {{ include "feedyruby.nextAuthSecret" . | b64enc }}
  {{- if and (.Values.enterprise.licenseKey) (ne .Values.enterprise.licenseKey "") }}
  ENTERPRISE_LICENSE_KEY: {{ .Values.enterprise.licenseKey | b64enc }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
  REDIS_PASSWORD: {{ $redisPassword | b64enc }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_ADMIN_PASSWORD: {{ $postgresAdminPassword | b64enc }}
  POSTGRES_USER_PASSWORD: {{ $postgresUserPassword | b64enc }}
  {{- end }}
{{- end }}
